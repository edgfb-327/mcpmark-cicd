name: PR Automation Workflow
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint checks
        id: eslint
        run: |
          npm run lint
          if [ $? -ne 0 ]; then
            echo "eslint_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Run Prettier formatting checks
        id: prettier
        run: |
          npx prettier --check .
          if [ $? -ne 0 ]; then
            echo "prettier_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Post Code Quality Report
        uses: actions/github-script@v7
        with:
          script: |
            const eslintStatus = ${{ steps.eslint.outputs.eslint_failed }} ? '❌ ESLint found errors' : '✅ ESLint passed';
            const prettierStatus = ${{ steps.prettier.outputs.prettier_failed }} ? '❌ Prettier found formatting issues' : '✅ Prettier passed';
            
            const commentBody = `## Code Quality Report
            ### ESLint: ${eslintStatus}
            ### Prettier: ${prettierStatus}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite with coverage
        id: tests
        run: |
          npm test -- --coverage
          if [ $? -ne 0 ]; then
            echo "tests_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error

      - name: Post Test Coverage Report
        uses: actions/github-script@v7
        with:
          script: |
            const testStatus = ${{ steps.tests.outputs.tests_failed }} ? '❌ Tests failed' : '✅ Tests passed';
            
            const commentBody = `## Test Coverage Report
            ### Test Status: ${testStatus}
            ### Full coverage details are available in the uploaded "coverage-report" artifact`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability check
        id: npm-audit
        run: |
          npm audit --json > audit.json
          if [ $? -ne 0 ]; then
            echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT
          fi

      - name: Scan for secrets in code changes
        id: secret-scan
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
        continue-on-error: true

      - name: Post Security Scan Report
        uses: actions/github-script@v7
        with:
          script: |
            const vulnStatus = ${{ steps.npm-audit.outputs.vulnerabilities_found }} ? '❌ Vulnerabilities detected in dependencies' : '✅ No vulnerabilities found';
            const secretStatus = ${{ steps.secret-scan.outcome }} === 'failure' ? '❌ Secrets detected in code changes' : '✅ No secrets detected';
            
            const commentBody = `## Security Scan Report
            ### Dependencies: ${vulnStatus}
            ### Vulnerabilities: Full details available in audit.json (check job logs)
            ### Secret Scan: ${secretStatus}`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        id: build
        run: |
          npm run build
          if [ $? -ne 0 ]; then
            echo "build_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Validate build output (endpoints check)
        id: endpoints
        run: |
          # Validate build directory exists (adjust path based on project structure)
          if [ -d "dist/" ]; then
            echo "✅ Build directory (dist/) exists"
          else
            echo "❌ Build directory missing"
            echo "endpoints_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload deployment preview artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: dist/
          if-no-files-found: error

      - name: Post Build Validation
        uses: actions/github-script@v7
        with:
          script: |
            const buildStatus = ${{ steps.build.outputs.build_failed }} ? '❌ Build failed' : '✅ Build succeeded';
            const endpointStatus = ${{ steps.endpoints.outputs.endpoints_failed }} ? '❌ Build validation failed' : '✅ Build output validated';
            
            const commentBody = `## Build Validation
            ### Build Status: ${buildStatus}
            ### Endpoint/Output Validation: ${endpointStatus}
            ### Deployment preview artifacts available in the "deployment-preview" artifact`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });